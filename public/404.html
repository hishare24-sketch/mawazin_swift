<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>منظومة التوظيف الذكية</title>
    <!--
      Single-Page-App fallback for GitHub Pages.
      Keeps the first path segment (the repo name) and re-encodes the rest into a
      query string, then redirects to the app, which restores the URL (see index.html).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
