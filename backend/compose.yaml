# ===== بيئة الباك-إند الكاملة عبر Docker =====
# php-fpm (التطبيق) + nginx (الويب) + postgres (القاعدة) — لا حاجة لأدوات محلية.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: recruitment
      DB_USERNAME: recruitment
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recruitment
      POSTGRES_USER: recruitment
      POSTGRES_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruitment"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dbdata:
